name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      publishing: ${{ steps.version.outputs.publishing }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - id: version
        shell: bash
        run: |
          cargo_version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          tag="${GITHUB_REF_NAME:-}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            tag="v$cargo_version"
            publishing=false
          else
            publishing=true
            tag_version="${tag#v}"
            if [ "$tag_version" != "$cargo_version" ]; then
              echo "Tag $tag does not match Cargo.toml version $cargo_version" >&2
              exit 1
            fi
          fi

          echo "version=$cargo_version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "publishing=$publishing" >> "$GITHUB_OUTPUT"

  build-unix:
    needs: prepare
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive_ext: tar.xz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive_ext: tar.xz
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            archive_ext: tar.xz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive_ext: tar.xz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          dist_dir="dist"
          package="hiverra-portal-${{ matrix.target }}"
          mkdir -p "$dist_dir/$package"
          cp "target/${{ matrix.target }}/release/portal" "$dist_dir/$package/portal"
          cp README.md LICENSE "$dist_dir/$package/"
          chmod +x "$dist_dir/$package/portal"
          tar -C "$dist_dir" -cJf "$dist_dir/$package.tar.xz" "$package"
          cd "$dist_dir"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$package.tar.xz" > "$package.tar.xz.sha256"
          else
            shasum -a 256 "$package.tar.xz" > "$package.tar.xz.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/hiverra-portal-${{ matrix.target }}.tar.xz
            dist/hiverra-portal-${{ matrix.target }}.tar.xz.sha256

  build-android:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build
        run: cargo ndk -t aarch64-linux-android --platform 28 build --release

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          dist_dir="dist"
          package="hiverra-portal-aarch64-linux-android"
          mkdir -p "$dist_dir/$package"
          cp target/aarch64-linux-android/release/portal "$dist_dir/$package/portal"
          cp README.md LICENSE "$dist_dir/$package/"
          chmod +x "$dist_dir/$package/portal"
          tar -C "$dist_dir" -czf "$dist_dir/$package.tar.gz" "$package"
          cd "$dist_dir"
          sha256sum "$package.tar.gz" > "$package.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-aarch64-linux-android
          path: |
            dist/hiverra-portal-aarch64-linux-android.tar.gz
            dist/hiverra-portal-aarch64-linux-android.tar.gz.sha256

  build-windows:
    needs: prepare
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Enable long paths
        run: git config --global core.longpaths true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install WiX tooling
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $wixRoot = [Environment]::GetFolderPath("ProgramFilesX86")
          $wixCandle = Get-ChildItem -Path $wixRoot -Filter candle.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($wixCandle) {
            $wixBin = Split-Path $wixCandle.FullName
            Add-Content $env:GITHUB_PATH $wixBin
          }
          cargo install cargo-wix

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        shell: pwsh
        run: |
          $dist = "dist"
          $package = "hiverra-portal-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Force -Path "$dist/$package" | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/portal.exe" "$dist/$package/portal.exe"
          Copy-Item "README.md" "$dist/$package/README.md"
          Copy-Item "LICENSE" "$dist/$package/LICENSE"
          Compress-Archive -Path "$dist/$package/*" -DestinationPath "$dist/$package.zip" -Force
          $hash = (Get-FileHash "$dist/$package.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $package.zip" | Set-Content "$dist/$package.zip.sha256"

          cargo wix --no-build --target x86_64-pc-windows-msvc --target-bin-dir "target/x86_64-pc-windows-msvc/release" --output "$dist/$package.msi"
          $msiHash = (Get-FileHash "$dist/$package.msi" -Algorithm SHA256).Hash.ToLower()
          "$msiHash  $package.msi" | Set-Content "$dist/$package.msi.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-x86_64-pc-windows-msvc
          path: |
            dist/hiverra-portal-x86_64-pc-windows-msvc.zip
            dist/hiverra-portal-x86_64-pc-windows-msvc.zip.sha256
            dist/hiverra-portal-x86_64-pc-windows-msvc.msi
            dist/hiverra-portal-x86_64-pc-windows-msvc.msi.sha256

  installers:
    needs:
      - prepare
      - build-unix
      - build-android
      - build-windows
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Generate installers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          cat > dist/hiverra-portal-installer.sh <<'SCRIPT'
          #!/bin/sh
          set -e

          REPO="Spectra010s/portal"
          TAG="${PORTAL_INSTALL_VERSION:-latest}"
          INSTALL_DIR="${PORTAL_INSTALL_DIR:-$HOME/.local/bin}"

          platform=$(uname -s | tr '[:upper:]' '[:lower:]')
          arch=$(uname -m)
          archive_ext="tar.xz"

          if [ -n "${PREFIX:-}" ] && echo "$PREFIX" | grep -q "com.termux"; then
            target="aarch64-linux-android"
            archive_ext="tar.gz"
            INSTALL_DIR="${PORTAL_INSTALL_DIR:-$PREFIX/bin}"
          elif [ "$platform" = "darwin" ] && [ "$arch" = "arm64" ]; then
            target="aarch64-apple-darwin"
          elif [ "$platform" = "darwin" ] && [ "$arch" = "x86_64" ]; then
            target="x86_64-apple-darwin"
          elif [ "$platform" = "linux" ] && { [ "$arch" = "aarch64" ] || [ "$arch" = "arm64" ]; }; then
            target="aarch64-unknown-linux-gnu"
          elif [ "$platform" = "linux" ] && [ "$arch" = "x86_64" ]; then
            target="x86_64-unknown-linux-gnu"
          else
            echo "Unsupported platform: $platform $arch" >&2
            exit 1
          fi

          asset="hiverra-portal-$target.$archive_ext"
          if [ "$TAG" = "latest" ]; then
            base_url="https://github.com/$REPO/releases/latest/download"
          else
            base_url="https://github.com/$REPO/releases/download/$TAG"
          fi

          tmp_dir=$(mktemp -d 2>/dev/null || mktemp -d -t portal-install)
          cleanup() { rm -rf "$tmp_dir"; }
          trap cleanup EXIT INT TERM

          echo "Installing Hiverra Portal for $target..."
          curl -fsSL "$base_url/$asset" -o "$tmp_dir/$asset"
          curl -fsSL "$base_url/$asset.sha256" -o "$tmp_dir/$asset.sha256"

          expected=$(awk '{print $1}' "$tmp_dir/$asset.sha256")
          if command -v sha256sum >/dev/null 2>&1; then
            actual=$(sha256sum "$tmp_dir/$asset" | awk '{print $1}')
          else
            actual=$(shasum -a 256 "$tmp_dir/$asset" | awk '{print $1}')
          fi
          if [ "$expected" != "$actual" ]; then
            echo "Checksum mismatch for $asset" >&2
            exit 1
          fi

          mkdir -p "$tmp_dir/extract"
          case "$archive_ext" in
            tar.gz) tar -xzf "$tmp_dir/$asset" -C "$tmp_dir/extract" ;;
            tar.xz) tar -xJf "$tmp_dir/$asset" -C "$tmp_dir/extract" ;;
          esac

          mkdir -p "$INSTALL_DIR"
          install -m 755 "$tmp_dir/extract/hiverra-portal-$target/portal" "$INSTALL_DIR/portal"

          echo "Portal installed to $INSTALL_DIR/portal"
          case ":$PATH:" in
            *":$INSTALL_DIR:"*) ;;
            *) echo "Add $INSTALL_DIR to PATH if 'portal' is not found." ;;
          esac
          SCRIPT
          chmod +x dist/hiverra-portal-installer.sh

          cat > dist/hiverra-portal-installer.ps1 <<'SCRIPT'
          $ErrorActionPreference = "Stop"

          $Repo = "Spectra010s/portal"
          $Tag = if ($env:PORTAL_INSTALL_VERSION) { $env:PORTAL_INSTALL_VERSION } else { "latest" }
          $InstallDir = if ($env:PORTAL_INSTALL_DIR) { $env:PORTAL_INSTALL_DIR } else { Join-Path $env:LOCALAPPDATA "Hiverra\Portal\bin" }
          $Target = "x86_64-pc-windows-msvc"
          $Asset = "hiverra-portal-$Target.zip"

          if ($Tag -eq "latest") {
            $BaseUrl = "https://github.com/$Repo/releases/latest/download"
          } else {
            $BaseUrl = "https://github.com/$Repo/releases/download/$Tag"
          }

          $Tmp = Join-Path ([System.IO.Path]::GetTempPath()) ([System.Guid]::NewGuid().ToString())
          New-Item -ItemType Directory -Force -Path $Tmp | Out-Null

          try {
            $Archive = Join-Path $Tmp $Asset
            $Checksum = Join-Path $Tmp "$Asset.sha256"

            Write-Host "Installing Hiverra Portal for $Target..."
            Invoke-WebRequest "$BaseUrl/$Asset" -OutFile $Archive
            Invoke-WebRequest "$BaseUrl/$Asset.sha256" -OutFile $Checksum

            $Expected = ((Get-Content $Checksum -Raw) -split '\s+')[0].ToLowerInvariant()
            $Actual = (Get-FileHash $Archive -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($Expected -ne $Actual) {
              throw "Checksum mismatch for $Asset"
            }

            $Extract = Join-Path $Tmp "extract"
            Expand-Archive -Path $Archive -DestinationPath $Extract -Force
            New-Item -ItemType Directory -Force -Path $InstallDir | Out-Null
            Copy-Item (Join-Path $Extract "portal.exe") (Join-Path $InstallDir "portal.exe") -Force
            $ReceiptDir = Join-Path $env:LOCALAPPDATA "Hiverra\Portal"
            New-Item -ItemType Directory -Force -Path $ReceiptDir | Out-Null
            @{
              method = "powershell"
              bin_path = Join-Path $InstallDir "portal.exe"
              version = $Tag
            } | ConvertTo-Json | Set-Content (Join-Path $ReceiptDir "install.json") -Encoding UTF8

            Write-Host "Portal installed to $InstallDir\portal.exe"
            if (($env:PATH -split ';') -notcontains $InstallDir) {
              $RegistryPath = 'registry::HKEY_CURRENT_USER\Environment'
              $CurrentPath = (Get-Item -LiteralPath $RegistryPath).GetValue('Path', '', 'DoNotExpandEnvironmentNames')
              $CurrentDirectories = $CurrentPath -split ';' -ne ''
              if ($InstallDir -notin $CurrentDirectories) {
                $NewPath = (,$InstallDir + $CurrentDirectories) -join ';'
                Set-ItemProperty -Type ExpandString -LiteralPath $RegistryPath Path $NewPath
                [Environment]::SetEnvironmentVariable('portal-path-refresh', '1', 'User')
                [Environment]::SetEnvironmentVariable('portal-path-refresh', $null, 'User')
              }
              Write-Host "Added $InstallDir to your user PATH. Restart your terminal if 'portal' is not found."
            }
          } finally {
            Remove-Item $Tmp -Recurse -Force -ErrorAction SilentlyContinue
          }
          SCRIPT

          cd dist
          sha256sum hiverra-portal-installer.sh > hiverra-portal-installer.sh.sha256
          sha256sum hiverra-portal-installer.ps1 > hiverra-portal-installer.ps1.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-installers
          path: |
            dist/hiverra-portal-installer.sh
            dist/hiverra-portal-installer.sh.sha256
            dist/hiverra-portal-installer.ps1
            dist/hiverra-portal-installer.ps1.sha256

  release:
    needs:
      - prepare
      - installers
    if: ${{ needs.prepare.outputs.publishing == 'true' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "Hiverra Portal $TAG" \
            --generate-notes \
            artifacts/*

  publish-npm:
    needs:
      - prepare
      - release
    if: ${{ needs.prepare.outputs.publishing == 'true' }}
    runs-on: ubuntu-22.04
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true

      - name: Build npm package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          PKG_DIR="npm_pkg"
          BIN_DIR="$PKG_DIR/bin"

          mkdir -p "$BIN_DIR"
          cd artifacts

          for tarball in hiverra-portal-*.tar.xz; do
            target=$(echo "$tarball" | sed 's/^hiverra-portal-//; s/\.tar\.xz$//')
            mkdir -p "../$BIN_DIR/$target"
            tar -xJf "$tarball" -C "../$BIN_DIR/$target" --strip-components=1
            chmod +x "../$BIN_DIR/$target/portal"
          done

          target="aarch64-linux-android"
          mkdir -p "../$BIN_DIR/$target"
          tar -xzf "hiverra-portal-$target.tar.gz" -C "../$BIN_DIR/$target" --strip-components=1
          chmod +x "../$BIN_DIR/$target/portal"

          target="x86_64-pc-windows-msvc"
          mkdir -p "../$BIN_DIR/$target"
          unzip -q -j "hiverra-portal-$target.zip" "*.exe" -d "../$BIN_DIR/$target"
          cd ..

          cat > "$BIN_DIR/portal.js" <<'SCRIPT'
          #!/usr/bin/env node
          const { spawn } = require("node:child_process");
          const path = require("node:path");
          const fs = require("node:fs");

          const override = process.env.PORTAL_NPM_TARGET;
          const platform = process.platform;
          const arch = process.arch;

          let target = override;
          if (!target) {
            if (platform === "win32" && arch === "x64") target = "x86_64-pc-windows-msvc";
            else if (platform === "darwin" && arch === "arm64") target = "aarch64-apple-darwin";
            else if (platform === "darwin" && arch === "x64") target = "x86_64-apple-darwin";
            else if (platform === "android" && arch === "arm64") target = "aarch64-linux-android";
            else if (platform === "linux" && arch === "arm64") target = "aarch64-unknown-linux-gnu";
            else if (platform === "linux" && arch === "x64") target = "x86_64-unknown-linux-gnu";
          }

          if (!target) {
            console.error("Unsupported platform:", platform, arch);
            process.exit(1);
          }

          const binName = platform === "win32" ? "portal.exe" : "portal";
          const binPath = path.join(__dirname, target, binName);

          if (!fs.existsSync(binPath)) {
            console.error("Binary not found for target:", target);
            process.exit(1);
          }

          const child = spawn(binPath, process.argv.slice(2), { stdio: "inherit" });
          child.on("exit", (code) => process.exit(code ?? 0));
          SCRIPT
          chmod +x "$BIN_DIR/portal.js"

          cat > "$PKG_DIR/package.json" <<SCRIPT
          {
            "name": "@hiverra/portal",
            "version": "$VERSION",
            "description": "Hiverra Portal CLI",
            "license": "MIT",
            "bin": {
              "portal": "bin/portal.js"
            },
            "files": [
              "bin/**",
              "README.md",
              "LICENSE"
            ]
          }
          SCRIPT

          cp README.md "$PKG_DIR/README.md"
          cp LICENSE "$PKG_DIR/LICENSE"

      - name: Publish npm package
        shell: bash
        run: |
          cd npm_pkg
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
