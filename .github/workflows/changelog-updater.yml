name: Automated Changelog Updater

on:
  push:
    branches:
      - main

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    if: github.repository == 'Spectra010s/portal'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Fetch all history for resolving parent commits

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Run Changelog Updater
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COMMIT_BEFORE: ${{ github.event.before }}
          COMMIT_AFTER: ${{ github.event.after }}
        run: node scripts/update-changelog.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          
          # Only commit and push if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore(changelog): automatically update CHANGELOG.md [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi
